<!DOCTYPE html>
<html>
  <head>
    <title>Pot Creature Crime</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css"/>
  </head>
  <body>
    padding: 10px;
    background-color: Red;
    <header class="container">
    <div class="row">
      <h1 class="col-sm-8">Pot Creatures Committing Crime</h1>
      <nav class="col-sm-4">
        <p>Pot Creatures</p>
        <p>Criminal Activity</p>
      </nav>
    </div>
  </header>
  <section class="jumbotron">
    <div class="container">
      <div class="row text-center">
        <h2>Pot Creatures</h2>
        <h3>Where are they now?</h3>
        <a class="btn btn-primary" href="#" role="button">Find Out</a>
      </div>
    </div>
  </section>
  <section class="container">
  <div class="row">
    <figure class="col-sm-4">
      <a href="https://www.db.yugioh-card.com/yugiohdb/card_search.action?ope=2&cid=4844">Pot of Greed</a>
      <img src="https://static.wikia.nocookie.net/yugioh/images/8/82/PotofGreed-TF04-JP-VG.jpg/revision/latest/scale-to-width-down/544?cb=20120829225457"/>
    </figure>
    <figure class="col-sm-6">
      <p>The embodiment of greed. He will take everything from you if given the chance, including your chances at topping a YCS.
      Rumour has it that it is impossible to fully contain despite the numerous petty criminal charges against it. Despite all impossible
      measures Pot of Greed will escape and once again force you to draw the only two bricks in your deck. It is currently forbidden for
      the pot to interact with humans at all but humans that are curious about it's power will pray using scapegoats as sacrifice
      to bring him back into this realm. It is currently guilty of such crimes as:</p>
      <ul>
        <li>
          Tax Evasion
        </li>
        <li>
          Multiple Tickets for speeding
        </li>
        <li>
          Murder(Unproven)
        </li>
      </ul>
    </figure>
  </div>
  </section>
  <section class="container">
  <div class="row">
    <figure class="col-sm-4">
      <a href="https://www.db.yugioh-card.com/yugiohdb/card_search.action?ope=2&cid=6511">Pot of Avarice</a>
      <img src="https://static.wikia.nocookie.net/yugioh/images/f/fa/PotofAvarice-OW.png/revision/latest/scale-to-width-down/416?cb=20140615142354"/>
    </figure>
    <figure class="col-sm-6">
      <p> This pot has allegedly existed throughout history, secretly leading and coercing kings and emperors towards utter disaster. It
      has been known to hide itself in throne rooms and treasuries to wait for some unsuspecting fool to manipulate into doing his bidding.
      Without proper care this pot has lead entire empires into ruins all for the sake of stealing their riches in the chaos. It is currently
      held prisoner with high security measures despite it making no attempt to escape. Only sometimes moving its mouth as if to say something.
      One can only imagine what this pot could be planning next. It is currently guilty of such crimes as: </p>
      <ul>
        <li>
          Abhorrent to look at
        </li>
        <li>
          Inflicting general terror on the populace
        </li>
        <li>
          Loitering
        </li>
      </ul>
    </figure>
  </div>
  </section>
  <section class="container">
  <div class="row">
    <figure class="col-sm-4">
      <a href="https://www.db.yugioh-card.com/yugiohdb/card_search.action?ope=2&cid=11583">Pot of Riches</a>
      <img src="https://storage.googleapis.com/ygoprodeck.com/pics_artgame/96598015.jpg"/>
    </figure>
    <figure class="col-sm-6">
      <p> Steals trust funds from babies. A gilded pot of greed. This pot of greed turned golden is believed to have been corrupted body
      the sheer value of it's form and no longer desires anything but more riches. In many cases this pot will inflict suffering in the process
      yet seems to simply not register this. It is solely focused on the aquisition of more riches and disregards any other beings who could get
      in the way. It's whereabouts are currently unknown. It is currently guilty of such crimes as:</p>
      <ul>
        <li>
          Petty Theft
        </li>
        <li>
          Theft
        </li>
        <li>
          Bank Robbery
        </li>
      </ul>
    </figure>
  </div>
  </section>
  <section class="container">
  <div class="row">
    <figure class="col-sm-4">
      <a href="https://www.db.yugioh-card.com/yugiohdb/card_search.action?ope=2&cid=5960">Avatar of the Pot</a>
      <img src="https://static.wikia.nocookie.net/yugioh/images/0/0c/AvatarofThePot-TF04-JP-VG.jpg/revision/latest/scale-to-width-down/544?cb=20120430215306"/>
    </figure>
    <figure class="col-sm-6">
      <p> The perfect being, only held back by its ungodly obsession with violence. A genetic mutation that was involved in an experiment testing
      the usefullness of a weaponized pot of greed. Created for combat purposes during the vietnam war, this beast of a pot proved to be exceedingly
      efficient at violence during the war but also completely unpredictable and even detrimental to the war effort. It was quickly deemed a national
      threat and taken under full custody through means not entirely known to the public at this time. He is currently held under maximum lockdown
      in a federal prison, only waiting for another chance to draw 3. It is currently guilty of such crimes as:</p>
      <ul>
        <li>
          Jaywalking
        </li>
        <li>
          Assault with a Legly Weapon
        </li>
        <li>
          Indecent Exposure
        </li>
      </ul>
    </figure>
  </div>
  </section>
  </body>
</html>
